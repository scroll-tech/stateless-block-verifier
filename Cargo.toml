[package]
name = "stateless-block-verifier"
version = "0.1.0"
edition = "2021"

[dependencies]
log = "0.4"
hex = "0.4"
eth-types = { path = "../zkevm-circuits/eth-types", features = ["scroll"] }
mpt-zktrie = { path = "../zkevm-circuits/zktrie" }
bus-mapping = { path = "../zkevm-circuits/bus-mapping", features = ["scroll"] }
zkevm-circuits = { path = "../zkevm-circuits/zkevm-circuits", features = ["scroll"] }
halo2_proofs = { git = "https://github.com/scroll-tech/halo2.git", branch = "v1.1" }
revm = { git = "https://github.com/scroll-tech/revm", default-features = false, features = ["scroll-default-handler", "std"], rev = "e1e8f7a" } # v35
rustc-hash = "1.1"
zktrie = { git = "https://github.com/scroll-tech/zktrie.git", branch = "main", features= ["rs_zktrie"] }

# binary dependencies
anyhow = { version = "1.0", optional = true }
async-channel = { version = "2.2", optional = true }
clap = { version = "4", optional = true }
env_logger = { version = "0.9", optional = true }
ethers-core = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7", optional = true }
ethers-providers = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7", default-features = false, optional = true }
futures = { version = "0.3", optional = true }
url = { version = "2.5", optional = true }
serde_json = { version = "1.0", optional = true }
serde = { version = "1.0", optional = true }
tokio = { version = "1", default-features = false, optional = true }

# optional
pprof = { version = "0.13", features = ["flamegraph"], optional = true }

[[bin]]
name = "stateless-block-verifier"
path = "src/bin/trace-verifier/main.rs"
required-features = ["bin-deps"]

[features]
bin-deps = [
    "anyhow",
    "async-channel",
    "clap",
    "clap/derive",
    "env_logger",
    "ethers-core",
    "ethers-core/scroll",
    "ethers-providers",
    "futures",
    "url",
    "serde_json",
    "serde",
    "serde/derive",
    "tokio",
    "tokio/fs",
    "tokio/macros",
    "tokio/rt-multi-thread"
]
profiling = ["pprof"]

[patch.crates-io]
ethers-core = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7" }
ethers-providers = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7" }
ethers = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7" }
ethers-etherscan = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7" }
ethers-signers  = { git = "https://github.com/scroll-tech/ethers-rs.git", branch = "v2.0.7" }
gobuild = { git = "https://github.com/scroll-tech/gobuild.git" }
halo2curves = { git = "https://github.com/scroll-tech/halo2curves", branch = "v0.1.0" }

[patch."https://github.com/privacy-scaling-explorations/halo2.git"]
halo2_proofs = { git = "https://github.com/scroll-tech/halo2.git", branch = "v1.1" }
[patch."https://github.com/privacy-scaling-explorations/poseidon.git"]
poseidon = { git = "https://github.com/scroll-tech/poseidon.git", branch = "main" }

[patch."https://github.com/privacy-scaling-explorations/bls12_381"]
bls12_381 = { git = "https://github.com/scroll-tech/bls12_381", branch = "feat/impl_scalar_field" }